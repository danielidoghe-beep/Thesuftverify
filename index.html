<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThesuftVerify</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>

<!-- ================= HEADER ================= -->

<header class="header">

    <div class="logo">
        <h2>ThesuftVerify</h2>
    </div>

    <nav class="nav">

        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Support</a>
        <a href="#">Login</a>

        <a href="#" class="signup-btn">
            Sign Up
        </a>

    </nav>

    <div class="menu-btn">

        ☰

    </div>

</header>

<!-- ================= HERO ================= -->

<section class="hero">

    <div class="hero-content">

        <h1>
            The Ultimate Panel Suite
            <br>
            for Digital Assets
        </h1>

        <p>
            Trusted by thousands of businesses worldwide.
        </p>

        <!-- Search -->

        <div class="search-box">

            <input
                type="text"
                placeholder="Search products..."
            >

            <button>

                Search

            </button>

        </div>

        <!-- Trending -->

        <div class="trending">

            <span>Trending:</span>

            <a href="#">WhatsApp</a>

            <a href="#">Telegram Premium</a>

            <a href="#">US Number</a>

            <a href="#">Instagram Likes</a>

        </div>

        <!-- Buttons -->

        <div class="hero-buttons">

            <a href="#" class="primary-btn">

                Get Started Free

            </a>

            <a href="#" class="secondary-btn">

                Explore Services

            </a>

        </div>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
